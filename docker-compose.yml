version: '3.9'

services:
  bot:
    build: .
    container_name: eth_payment_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist the SQLite database and any legacy JSON files
      - ./data:/app/data
    environment:
      - DATABASE_PATH=/app/data/bot.db
      - STORAGE_FILE=/app/data/paid_channels.json
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
